name: Linux
on:
  push:
    branches: ["main"]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write 
  issues: read
  packages: none

jobs:
  Build:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'myridiax'

    steps:
      - name: Install
        run: |
         sudo apt-get update -y          
         curl https://sh.rustup.rs -sSf | sh -s -- -y
         source $HOME/.cargo/env
         cargo --version
         
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        run: |
          source $HOME/.cargo/env          
          cargo build --release 
 
          
      - name: Rename 
        run: |
          cp target/release/ct target/release/ct_linux

      - name: Release
        if: github.repository_owner == 'myridia'                  
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 'target/release/ct_linux'
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true



          


    
   


        


        


 
     
